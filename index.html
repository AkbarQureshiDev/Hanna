<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanna Lifestyle</title>
  <link rel="stylesheet" type="text/css" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

  <header
    class="flex items-center justify-between md:justify-evenly  px-8 py-4 bg-[#EAE8E7] fixed top-0 w-full h-[70px] shadow-md z-[1000]">
    <div class="logo">
      <h5 class="text-3xl"><b>Hanna</b>LifeStyle</h5>
    </div>

    <div class="navbar">
      <ul>
        <li><a href="#home" class="scroll-link">Home</a></li>
        <li><a href="#shop" class="scroll-link">Shop</a></li>
        <li><a href="#about" class="scroll-link">About</a></li>
        <li><a href="#contact" class="scroll-link">Contact</a></li>
      </ul>
    </div>

    <div class="icons hidden md:flex">
      <i class="fas fa-search"></i>
      <i class="fas fa-shopping-cart" style="margin-left:20px"></i>
      <i class="fas fa-heart" style="margin-left:20px"></i>
      <i class="fa-solid fa-moon theme-toggle" style="margin-left:20px; cursor:pointer"></i>
    </div>

    <button class="menu-btn" aria-label="Open menu">
      <i class="fa-solid fa-bars"></i>
    </button>
  </header>

  <aside class="sidebar" aria-hidden="true">
    <div class="sidebar-header">
      <h5 class="text-3xl"><b>Coza</b>Store</h5>
      <button class="close-sidebar" aria-label="Close menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="#home" class="scroll-link">Home</a></li>
        <li><a href="#shop" class="scroll-link">Shop</a></li>
        <li><a href="#about" class="scroll-link">About</a></li>
        <li><a href="#contact" class="scroll-link">Contact</a></li>
      </ul>
    </nav>
    <div class="sidebar-icons">
      <i class="fas fa-search"></i>
      <i class="fas fa-shopping-cart" style="margin-left:20px"></i>
      <i class="fas fa-heart" style="margin-left:20px"></i>
      <i class="fa-solid fa-moon theme-toggle" style="margin-left:20px; cursor:pointer"></i>
    </div>
  </aside>

  <div id="home"
    class="relative flex items-center justify-center md:justify-start w-full h-[520px] mt-[70px] bg-[url('mbherobg.jpeg')] md:bg-[url('herobg.png')] bg-cover bg-center text-center md:text-start ">
    <div class="absolute inset-0 bg-black/30 md:bg-black/0"></div>

  </div>




  <script src="script.js"></script>
</body>

</html>
